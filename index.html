<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#46b7f2">
    <title>JIE Beach Run</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="arcade" aria-label="JIE Beach Run">
      <header class="hud">
        <div class="brand">
          <span>EGOMASINA</span>
          <strong>JIE BEACH RUN</strong>
        </div>
        <div class="track" id="track-label">01 / JIE</div>
        <div class="score" id="score-label">000000</div>
        <button class="icon-button" id="music-button" type="button" aria-label="Play or pause music">▶</button>
      </header>

      <section class="cabinet" aria-label="Beach arcade game">
        <canvas id="game-canvas" width="960" height="540" aria-label="Pixel beach runner game"></canvas>

        <div class="panel" id="start-panel">
          <p class="eyebrow">13 SONG BEACH CARTRIDGE</p>
          <h1>JIE BEACH RUN</h1>
          <p class="status" id="status-line">Dodge beach junk, grab tapes, keep the band moving.</p>
          <div class="actions">
            <button id="prev-track" type="button" aria-label="Previous track">◀</button>
            <button class="primary" id="start-game" type="button">START</button>
            <button id="next-track" type="button" aria-label="Next track">▶</button>
          </div>
          <p class="keys">ARROWS / A D TO MOVE · SPACE / TAP TO JUMP</p>
        </div>
      </section>

      <nav class="touch-controls" aria-label="Touch controls">
        <button id="touch-left" type="button" aria-label="Move left">◀</button>
        <button id="touch-jump" type="button" aria-label="Jump">▲</button>
        <button id="touch-right" type="button" aria-label="Move right">▶</button>
      </nav>

      <footer class="footer">
        <a href="https://egomasina.bandcamp.com/" rel="noopener">Bandcamp</a>
        <span id="best-label">BEST 000000</span>
      </footer>
    </main>

    <audio id="album-audio" preload="none" crossorigin="anonymous"></audio>
    <script type="module" src="./main.js"></script>
  </body>
</html>
